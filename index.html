<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ლივის 4 წლის წვეულება 🎉</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(-45deg, #ffb6d9, #d8b4ff, #a5d8ff, #ffd6f5);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    padding: 20px;
    position: relative;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(12px);
    padding: 40px 30px;
    border-radius: 35px;
    max-width: 700px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    position: relative;
    z-index: 2;
    border: 4px solid rgba(255,255,255,0.4);
}

.photo {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    object-fit: cover;
    border: 8px solid white;
    margin-bottom: 25px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

/* Title with dancing letters */

.title {
    margin-bottom: 25px;
    line-height: 1.4;
}

.title span {
    display: inline-block;
    font-size: 44px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.15);
    animation: dance 1.6s ease-in-out infinite;
}

.title span:nth-child(1) { animation-delay: 0s; }
.title span:nth-child(2) { animation-delay: 0.1s; }
.title span:nth-child(3) { animation-delay: 0.2s; }
.title span:nth-child(4) { animation-delay: 0.3s; }
.title span:nth-child(5) { animation-delay: 0.4s; }
.title span:nth-child(6) { animation-delay: 0.5s; }
.title span:nth-child(7) { animation-delay: 0.6s; }
.title span:nth-child(8) { animation-delay: 0.7s; }
.title span:nth-child(9) { animation-delay: 0.8s; }
.title span:nth-child(10) { animation-delay: 0.9s; }
.title span:nth-child(11) { animation-delay: 1s; }
.title span:nth-child(12) { animation-delay: 1.1s; }
.title span:nth-child(13) { animation-delay: 1.2s; }
.title span:nth-child(14) { animation-delay: 1.3s; }
.title span:nth-child(15) { animation-delay: 1.4s; }

@keyframes dance {
    0%, 100% {
        transform: translateY(0) rotate(0deg);
    }
    25% {
        transform: translateY(-6px) rotate(2deg);
    }
    50% {
        transform: translateY(0) rotate(0deg);
    }
    75% {
        transform: translateY(4px) rotate(-2deg);
    }
}

/* Cute text bubbles */

.text-box {
    background: rgba(255,255,255,0.85);
    border-radius: 25px;
    padding: 18px 20px;
    margin: 16px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.text {
    font-size: 24px;
    font-weight: bold;
    line-height: 1.5;
}

.text1 {
    color: #ff4fa3;
}

.text2 {
    color: #8b5cf6;
}

.text3 {
    color: #3b82f6;
}

.final {
    font-size: 22px;
}

/* Decorations */

.star, .heart, .balloon {
    position: absolute;
    font-size: 28px;
    animation: floatUp linear infinite;
    opacity: 0.9;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh) rotate(0deg);
    }
    to {
        transform: translateY(-120vh) rotate(360deg);
    }
}

.star:nth-child(1) {
    left: 8%;
    animation-duration: 12s;
}

.star:nth-child(2) {
    left: 20%;
    animation-duration: 16s;
}

.star:nth-child(3) {
    left: 85%;
    animation-duration: 14s;
}

.heart {
    left: 70%;
    animation-duration: 15s;
}

.balloon {
    left: 92%;
    animation-duration: 18s;
}
</style>
</head>
<body>

<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="heart">💖</div>
<div class="balloon">🎈</div>

<div class="container">

    <img src="livi.jpg" alt="Birthday Photo" class="photo">

    <div class="title">
        <span>ლ</span>
        <span>ი</span>
        <span>ვ</span>
        <span>ი</span>
        <span>ს</span>
        <span>&nbsp;</span>
        <span>4</span>
        <span>&nbsp;</span>
        <span>წ</span>
        <span>ლ</span>
        <span>ი</span>
        <span>ს</span>
        <span>&nbsp;</span>
        <span>წ</span>
        <span>ვ</span>
        <span>ე</span>
        <span>უ</span>
        <span>ლ</span>
        <span>ე</span>
        <span>ბ</span>
        <span>ა</span>
    </div>

    <div class="text-box">
        <div class="text text1">
            გამიხარდება თუ ამ მნიშვნელოვან დღეს<br>
            ჩემთან ერთად გაატარებ
        </div>
    </div>

    <div class="text-box">
        <div class="text text2">
            8 მაისი • 16:30
        </div>
    </div>

    <div class="text-box">
        <div class="text text3 final">
            მისამართი: ბათუმი მოლი,<br>
            მე-4 სართული Donaldoland
        </div>
    </div>

</div>

</body>
</html>
