<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ლივის 4 წლის წვეულება 🎉</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(-45deg, #ffd6ec, #e6d6ff, #d6f0ff, #ffe3f5);
    background-size: 400% 400%;
    animation: gradientMove 14s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 20px;
    position: relative;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🎊 PARTICLES */

.particle {
    position: fixed;
    bottom: -40px;
    pointer-events: none;
    z-index: 1;
    user-select: none;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
    }
    10% { opacity: 1; }
    100% {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
    }
}

/* 💖 CORNER IMAGES */

.corner-img {
    position: absolute;
    width: 100px;
    z-index: 1;
    opacity: 0.95;
    pointer-events: none;
    animation: heartbeat 2s ease-in-out infinite;
}

@keyframes heartbeat {
    0%,100% { transform: scale(1); }
    25% { transform: scale(1.1); }
    50% { transform: scale(1); }
    75% { transform: scale(1.15); }
}

.top-left { top: 20px; left: 20px; }
.top-right { top: 20px; right: 20px; }
.bottom-left { bottom: 20px; left: 20px; }
.bottom-right { bottom: 20px; right: 20px; }

/* 🎂 CARD */

.container {
    width: 100%;
    max-width: 720px;
    text-align: center;
    background: rgba(255,255,255,0.20);
    backdrop-filter: blur(14px);
    padding: 36px 24px;
    border-radius: 32px;
    border: 3px solid rgba(255,255,255,0.25);
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
}

.photo {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    border: 7px solid white;
    margin-bottom: 24px;
}

/* 🎉 TITLE */

.title span {
    display: inline-block;
    font-size: 45px;
    font-weight: bold;
    color: #ff4fa3;
    text-shadow:
        0 0 6px rgba(255, 79, 163, 0.6),
        0 0 12px rgba(255, 79, 163, 0.4);
    animation: dance 1.6s ease-in-out infinite;
}

@keyframes dance {
    0%,100% { transform: translateY(0); }
    25% { transform: translateY(-5px); }
    75% { transform: translateY(3px); }
}

/* 🧁 TEXT */

.text-box {
    background: rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 18px;
    margin: 14px 0;
}

.text {
    font-size: 22px;
    font-weight: bold;
    line-height: 1.6;
}

.text1 { color: #c2185b; }
.text2 { color: #5e35b1; }
.text3 { color: #1565c0; }

.final {
    font-size: 20px;
}

/* 📱 MOBILE */

@media (max-width: 768px) {
    body { align-items: flex-start; }

    .photo { width: 170px; height: 170px; }

    .title span { font-size: 30px; }

    .text { font-size: 18px; }
}

@media (max-width: 480px) {
    .title span { font-size: 24px; }
    .text { font-size: 16px; }
    .photo { width: 140px; height: 140px; }
}
</style>
</head>

<body>

<!-- CORNER DECOR -->
<img src="heart.png.png" class="corner-img top-left">
<img src="heart.png.png" class="corner-img top-right">
<img src="heart.png.png" class="corner-img bottom-left">
<img src="heart.png.png" class="corner-img bottom-right">

<div class="container">

    <img src="liviku.jpg" class="photo">

    <div class="title">
        <span>🎉 ლ</span><span>ი</span><span>ვ</span><span>ი</span>
        <span>&nbsp;</span>
        <span>4</span>
        <span>&nbsp;</span>
        <span>წ</span><span>ლ</span><span>ი</span><span>ს</span>
        <span>&nbsp;🎉</span>
    </div>

    <div class="text-box">
        <div class="text text1">
            💖 გამიხარდება თუ ამ მნიშვნელოვან დღეს<br>
            ჩემთან ერთად გაატარებ 🎉
        </div>
    </div>

    <div class="text-box">
        <div class="text text2">
            🎂 8 მაისი • 16:30 🎈
        </div>
    </div>

    <div class="text-box">
        <div class="text text3 final">
            📍 ბათუმი მოლი, მე-4 სართული Donaldoland ✨
        </div>
    </div>

</div>

<!-- 🎊 PARTICLE SYSTEM -->
<script>
const emojis = ["⭐","✨","💫","💖","🎉","🎊","🎈"];

function createParticle() {
    const el = document.createElement("div");
    el.className = "particle";

    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    el.style.left = Math.random() * 100 + "vw";

    const size = Math.random() * 20 + 16;
    el.style.fontSize = size + "px";

    const duration = Math.random() * 5 + 8;
    el.style.animationDuration = duration + "s";

    document.body.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, duration * 1000);
}

// spawn continuously
setInterval(createParticle, 250);
</script>

</body>
</html>
