<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ლივის 4 წლის წვეულება 🎉</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(-45deg, #ffd6ec, #e6d6ff, #d6f0ff, #ffe3f5);
    background-size: 400% 400%;
    animation: gradientMove 14s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 20px;
    position: relative;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* STARS */

.star {
    position: absolute;
    top: 0;
    color: white;
    opacity: 0.9;
    z-index: 1;
    pointer-events: none;

    animation: floatUp linear infinite, twinkle 1.8s ease-in-out infinite;
}

/* floating movement */
@keyframes floatUp {
    from { transform: translateY(100vh) rotate(0deg); }
    to   { transform: translateY(-120vh) rotate(360deg); }
}

/* soft sparkle effect */
@keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.3); }
}

/* random sizes + speeds */
.star:nth-child(1) { left: 5%; font-size: 18px; animation-duration: 10s, 2s; }
.star:nth-child(2) { left: 12%; font-size: 26px; animation-duration: 14s, 3s; }
.star:nth-child(3) { left: 20%; font-size: 20px; animation-duration: 12s, 2.5s; }
.star:nth-child(4) { left: 28%; font-size: 30px; animation-duration: 18s, 2s; }
.star:nth-child(5) { left: 36%; font-size: 22px; animation-duration: 13s, 2.8s; }
.star:nth-child(6) { left: 44%; font-size: 24px; animation-duration: 16s, 2.2s; }
.star:nth-child(7) { left: 52%; font-size: 18px; animation-duration: 11s, 3s; }
.star:nth-child(8) { left: 60%; font-size: 26px; animation-duration: 14s, 2.4s; }
.star:nth-child(9) { left: 68%; font-size: 20px; animation-duration: 17s, 2.6s; }
.star:nth-child(10) { left: 76%; font-size: 28px; animation-duration: 12s, 2.1s; }
.star:nth-child(11) { left: 84%; font-size: 24px; animation-duration: 19s, 2.9s; }
.star:nth-child(12) { left: 92%; font-size: 18px; animation-duration: 13s, 2.3s; }

/* FLOATING EMOJIS */
    .float {
    position: absolute;
    bottom: -50px;
    font-size: 28px;
    z-index: 1;
    animation: floatEmoji 10s linear infinite;
    opacity: 0.8;
}

@keyframes floatEmoji {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
    }
    10% { opacity: 1; }
    100% {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
    }
}

/* random positions */
.float:nth-child(1) { left: 10%; animation-duration: 12s; }
.float:nth-child(2) { left: 30%; animation-duration: 10s; }
.float:nth-child(3) { left: 50%; animation-duration: 14s; }
.float:nth-child(4) { left: 70%; animation-duration: 11s; }
.float:nth-child(5) { left: 85%; animation-duration: 13s; }

/* DECOR IMAGES */

.corner-img {
    position: absolute;
    width: 100px;
    z-index: 1;
    opacity: 0.95;
    pointer-events: none;

    animation: heartbeat 2.2s ease-in-out infinite;
    transform-origin: center;
}

.top-left { top: 20px; left: 20px; }
.top-right { top: 20px; right: 20px; }
.bottom-left { bottom: 20px; left: 20px; }
.bottom-right { bottom: 20px; right: 20px; }

/* MAIN CARD */

.container {
    width: 100%;
    max-width: 720px;
    text-align: center;
    background: rgba(255,255,255,0.20);
    backdrop-filter: blur(14px);
    padding: 36px 24px;
    border-radius: 32px;
    border: 3px solid rgba(255,255,255,0.25);
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
}

.photo {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    border: 7px solid white;
    margin-bottom: 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

/* TITLE */

.title span {
    display: inline-block;
    font-size: 42px;
    font-weight: bold;
    color: #ff4fa3;

    text-shadow:
        0 0 6px rgba(255, 79, 163, 0.6),
        0 0 12px rgba(255, 79, 163, 0.4);

    animation: dance 1.6s ease-in-out infinite;
}


@keyframes dance {
    0%,100% { transform: translateY(0); }
    25% { transform: translateY(-5px); }
    75% { transform: translateY(3px); }
}

    @keyframes shine {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

/* TEXT BOXES */

.text-box {
    background: rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 18px;
    margin: 14px 0;
}

.text {
    font-size: 22px;
    font-weight: bold;
    line-height: 1.6;
}

/* DARKER PASTEL COLORS (NO STROKE) */

.text1 { color: #c2185b; }   /* pink */
.text2 { color: #5e35b1; }   /* purple */
.text3 { color: #1565c0; }   /* blue */

.final {
    font-size: 20px;
}

/* MOBILE */

@media (max-width: 768px) {
    body { padding: 14px; align-items: flex-start; }

    .container { padding: 28px 18px; }

    .photo { width: 170px; height: 170px; }

    .title span { font-size: 30px; }

    .text { font-size: 18px; }
}

@media (max-width: 480px) {
    .title span { font-size: 24px; }
    .text { font-size: 16px; }
    .photo { width: 140px; height: 140px; }
}
</style>
</head>
