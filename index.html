<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ლივის 4 წლის წვეულება 🎉</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(-45deg, #ffd6ec, #e6d6ff, #d6f0ff, #ffe3f5);
    background-size: 400% 400%;
    animation: gradientMove 14s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 20px;
    position: relative;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* STARS */

.star {
    position: absolute;
    color: white;
    opacity: 0.8;
    animation: floatUp linear infinite;
    z-index: 1;
    pointer-events: none;
}

@keyframes floatUp {
    from { transform: translateY(100vh) rotate(0deg); }
    to { transform: translateY(-120vh) rotate(360deg); }
}

.star:nth-child(1) { left: 3%; font-size: 18px; animation-duration: 10s; }
.star:nth-child(2) { left: 10%; font-size: 26px; animation-duration: 14s; }
.star:nth-child(3) { left: 18%; font-size: 20px; animation-duration: 12s; }
.star:nth-child(4) { left: 26%; font-size: 28px; animation-duration: 18s; }
.star:nth-child(5) { left: 34%; font-size: 22px; animation-duration: 13s; }
.star:nth-child(6) { left: 42%; font-size: 24px; animation-duration: 16s; }
.star:nth-child(7) { left: 50%; font-size: 18px; animation-duration: 11s; }
.star:nth-child(8) { left: 58%; font-size: 26px; animation-duration: 14s; }
.star:nth-child(9) { left: 66%; font-size: 20px; animation-duration: 17s; }
.star:nth-child(10) { left: 74%; font-size: 28px; animation-duration: 12s; }
.star:nth-child(11) { left: 82%; font-size: 24px; animation-duration: 19s; }
.star:nth-child(12) { left: 90%; font-size: 18px; animation-duration: 13s; }

/* DECOR IMAGES */

.corner-img {
    position: absolute;
    width: 100px;
    z-index: 1;
    opacity: 0.95;
    pointer-events: none;

    animation: heartbeat 2.2s ease-in-out infinite;
    transform-origin: center;
}

.top-left { top: 20px; left: 20px; }
.top-right { top: 20px; right: 20px; }
.bottom-left { bottom: 20px; left: 20px; }
.bottom-right { bottom: 20px; right: 20px; }

/* MAIN CARD */

.container {
    width: 100%;
    max-width: 720px;
    text-align: center;
    background: rgba(255,255,255,0.20);
    backdrop-filter: blur(14px);
    padding: 36px 24px;
    border-radius: 32px;
    border: 3px solid rgba(255,255,255,0.25);
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
}

.photo {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    border: 7px solid white;
    margin-bottom: 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

/* TITLE */

.title span {
    display: inline-block;
    font-size: 42px;
    font-weight: bold;

    background: linear-gradient(
        90deg,
        #ff4fa3,
        #ff8ad4,
        #ffffff,
        #ff4fa3
    );
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: dance 1.6s ease-in-out infinite, shine 2.5s linear infinite;

    text-shadow:
        0 0 10px rgba(255, 79, 163, 0.4),
        0 0 20px rgba(255, 79, 163, 0.3);
}


@keyframes dance {
    0%,100% { transform: translateY(0); }
    25% { transform: translateY(-5px); }
    75% { transform: translateY(3px); }
}

    @keyframes shine {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

/* TEXT BOXES */

.text-box {
    background: rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 18px;
    margin: 14px 0;
}

.text {
    font-size: 22px;
    font-weight: bold;
    line-height: 1.6;
}

/* DARKER PASTEL COLORS (NO STROKE) */

.text1 { color: #c2185b; }   /* pink */
.text2 { color: #5e35b1; }   /* purple */
.text3 { color: #1565c0; }   /* blue */

.final {
    font-size: 20px;
}

/* MOBILE */

@media (max-width: 768px) {
    body { padding: 14px; align-items: flex-start; }

    .container { padding: 28px 18px; }

    .photo { width: 170px; height: 170px; }

    .title span { font-size: 30px; }

    .text { font-size: 18px; }
}

@media (max-width: 480px) {
    .title span { font-size: 24px; }
    .text { font-size: 16px; }
    .photo { width: 140px; height: 140px; }
}
</style>
</head>

<body>

<!-- STARS -->
<div class="star">⭐</div>
<div class="star">✨</div>
<div class="star">⭐</div>
<div class="star">✨</div>
<div class="star">⭐</div>
<div class="star">✨</div>
<div class="star">⭐</div>
<div class="star">✨</div>
<div class="star">⭐</div>
<div class="star">✨</div>
<div class="star">⭐</div>
<div class="star">✨</div>

<!-- DECOR IMAGES -->
<img src="heart.png.png" class="corner-img top-left">
<img src="heart.png.png" class="corner-img top-right">
<img src="heart.png.png" class="corner-img bottom-left">
<img src="heart.png.png" class="corner-img bottom-right">

<div class="container">

    <img src="livi.jpg" class="photo">

    <div class="title">
    <span>🎉 ლ</span><span>ი</span><span>ვ</span><span>ი</span><span>ს</span>
    <span>&nbsp;</span>
    <span>4</span>
    <span>&nbsp;</span>
    <span>წ</span><span>ლ</span><span>ი</span><span>ს</span>
    <span>&nbsp;</span>
    <span>წ</span><span>ვ</span><span>ე</span><span>უ</span><span>ლ</span><span>ე</span><span>ბ</span><span>ა</span>
    <span>&nbsp;🎉</span>
</div>

    <div class="text-box">
        <div class="text text1">
            💖 გამიხარდება თუ ამ მნიშვნელოვან დღეს<br>
            ჩემთან ერთად გაატარებ 🎉
        </div>
    </div>

    <div class="text-box">

    <div class="text-box">

</div>

</body>
</html>
