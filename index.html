<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ლივის 4 წლის წვეულება 🎉</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(-45deg, #ffd6ec, #e6d6ff, #d6f0ff, #ffe3f5);
    background-size: 400% 400%;
    animation: gradientMove 14s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 20px;
    position: relative;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* STARS */

.star {
    position: absolute;
    color: white;
    opacity: 0.8;
    animation: floatUp linear infinite;
    z-index: 1;
    pointer-events: none;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh) rotate(0deg);
    }
    to {
        transform: translateY(-120vh) rotate(360deg);
    }
}

.star:nth-child(1) { left: 3%; font-size: 18px; animation-duration: 10s; }
.star:nth-child(2) { left: 8%; font-size: 24px; animation-duration: 14s; }
.star:nth-child(3) { left: 14%; font-size: 20px; animation-duration: 12s; }
.star:nth-child(4) { left: 22%; font-size: 28px; animation-duration: 18s; }
.star:nth-child(5) { left: 30%; font-size: 22px; animation-duration: 13s; }
.star:nth-child(6) { left: 38%; font-size: 26px; animation-duration: 16s; }
.star:nth-child(7) { left: 46%; font-size: 18px; animation-duration: 11s; }
.star:nth-child(8) { left: 54%; font-size: 24px; animation-duration: 14s; }
.star:nth-child(9) { left: 62%; font-size: 20px; animation-duration: 17s; }
.star:nth-child(10) { left: 70%; font-size: 28px; animation-duration: 12s; }
.star:nth-child(11) { left: 78%; font-size: 24px; animation-duration: 19s; }
.star:nth-child(12) { left: 86%; font-size: 18px; animation-duration: 13s; }
.star:nth-child(13) { left: 92%; font-size: 24px; animation-duration: 15s; }

/* DECORATION IMAGES */

.corner-img {
    position: absolute;
    width: 110px;
    z-index: 1;
    opacity: 0.95;
    pointer-events: none;
}

.top-left {
    top: 20px;
    left: 20px;
}

.top-right {
    top: 20px;
    right: 20px;
}

.bottom-left {
    bottom: 20px;
    left: 20px;
}

.bottom-right {
    bottom: 20px;
    right: 20px;
}

/* MAIN CARD */

.container {
    width: 100%;
    max-width: 720px;
    text-align: center;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(14px);
    padding: 36px 24px;
    border-radius: 32px;
    border: 3px solid rgba(255,255,255,0.25);
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
}

.photo {
    width: 220px;
    height: 220px;
    max-width: 70vw;
    max-height: 70vw;
    border-radius: 50%;
    object-fit: cover;
    border: 8px solid white;
    margin-bottom: 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

/* TITLE */

.title {
    margin-bottom: 24px;
    line-height: 1.5;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2px;
}

.title span {
    display: inline-block;
    font-size: 42px;
    font-weight: bold;
    color: white;
    text-shadow:
        0 0 8px #ff9ad5,
        0 0 16px #ff9ad5,
        0 0 24px #ff7fc8,
        0 0 36px #ff7fc8;
    animation: dance 1.6s ease-in-out infinite;
}

@keyframes dance {
    0%, 100% {
        transform: translateY(0);
    }
    25% {
        transform: translateY(-5px) rotate(2deg);
    }
    75% {
        transform: translateY(3px) rotate(-2deg);
    }
}

/* TEXT BOXES */

.text-box {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 24px;
    padding: 18px;
    margin: 14px 0;
}

.text {
    font-size: 23px;
    font-weight: bold;
    line-height: 1.6;
    word-break: break-word;
}

.text1 {
    color: #ffd4ea;
}

.text2 {
    color: #eadbff;
}

.text3 {
    color: #d8eeff;
}

.final {
    font-size: 21px;
}

/* MOBILE FIX */

@media (max-width: 768px) {
    body {
        padding: 14px;
        align-items: flex-start;
    }

    .container {
        padding: 28px 18px;
        border-radius: 26px;
        margin-top: 20px;
        margin-bottom: 20px;
    }

    .photo {
        width: 180px;
        height: 180px;
        border-width: 6px;
    }

    .title span {
        font-size: 30px;
    }

    .text {
        font-size: 18px;
        line-height: 1.5;
    }

    .final {
        font-size: 17px;
    }

    .corner-img {
        width: 70px;
        opacity: 0.85;
    }

    .top-left {
        top: 10px;
        left: 10px;
    }

    .top-right {
        top: 10px;
        right: 10px;
    }

    .bottom-left {
        bottom: 10px;
        left: 10px;
    }

    .bottom-right {
        bottom: 10px;
        right: 10px;
    }
}

@media (max-width: 480px) {
    .title span {
        font-size: 24px;
    }

    .text {
        font-size: 16px;
    }

    .final {
        font-size: 15px;
    }

    .photo {
        width: 150px;
        height: 150px;
    }

    .corner-img {
        width: 55px;
    }
}
</style>
</head>
<body>

<!-- STARS -->
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>

<!-- DECORATION IMAGES -->
<img src="star-bear.png" class="corner-img top-left">
<img src="balloon.png" class="corner-img top-right">
<img src="cake.png" class="corner-img bottom-left">
<img src="gift.png" class="corner-img bottom-right">

<div class="container">

    <img src="birthday.jpg" alt="Birthday Photo" class="photo">

    <div class="title">
        <span>ლ</span><span>ი</span><span>ვ</span><span>ი</span><span>ს</span>
        <span>&nbsp;</span>
        <span>4</span>
        <span>&nbsp;</span>
        <span>წ</span><span>ლ</span><span>ი</span><span>ს</span>
        <span>&nbsp;</span>
        <span>წ</span><span>ვ</span><span>ე</span><span>უ</span><span>ლ</span><span>ე</span><span>ბ</span><span>ა</span>
    </div>

    <div class="text-box">
        <div class="text text1">
            გამიხარდება თუ ამ მნიშვნელოვან დღეს<br>
            ჩემთან ერთად გაატარებ
        </div>
    </div>

    <div class="text-box">
        <div class="text text2">
            8 მაისი • 16:30
        </div>
    </div>

    <div class="text-box">
        <div class="text text3 final">
            მისამართი: ბათუმი მოლი,<br>
            მე-4 სართული Donaldoland
        </div>
    </div>

</div>

</body>
</html>
